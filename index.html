<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net/ 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net/ 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net/; img-src 'self' data:; connect-src 'self' https://api.steampowered.com https://store.steampowered.com;">
    <title>GreenLuma 2024 Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
<body class="bg-dark text-light">
    <div class="d-flex flex-column h-100" id="main-container">
        <!-- Header -->
        <header class="bg-dark-custom py-1 px-2 border-bottom border-dark-custom">
            <div class="d-flex flex-column w-100 align-items-center" style="gap: 0.5rem;">
                <!-- Title (top) -->
                <h1 class="mt-1 fw-bold text-center" style="font-size: 1.5rem;">GreenLuma Manager</h1>

                <!-- Author and Version (bottom) -->
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div class="d-flex flex-column align-items-start" style="min-width: 0;">
                        <div id="author-name" class="small text-muted-custom ms-2">by: Achrllrogia
                        </div>
                        <div>
                            <a href="https://github.com/achrllrogia45" target="_blank" rel="noopener noreferrer" title="GitHub" class="m-1 text-light text-decoration-none">
                                <i class="bi bi-github" aria-hidden="true" style="font-size:0.8rem;" title="GitHub"></i>
                            </a>
                            <a href="https://steamcommunity.com/id/achrllrogia/" target="_blank" rel="noopener noreferrer" title="Steam" class="m-1 text-light text-decoration-none">
                                <i class="bi bi-steam" aria-hidden="true" style="font-size:0.8rem;" title="Steam"></i>
                            </a>
                            <span class="small text-muted-custom ms-2" style="font-size: 0.8rem;">◤Give me a Bump◢ </span>
                        </div>
                    </div>
                    <span class="small text-muted-custom">v.1</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex-fill d-flex flex-column overflow-hidden">
            <!-- Button Section -->
            <div class="p-2 border-bottom border-dark-custom">
                <div class="d-flex align-items-center" style="gap: 0;">
                    <!-- Left side: 2 buttons -->
                    <div class="d-flex flex-fill gap-2" style="max-width: 50%;">
                        <button id="steamSearchBtn" class="btn btn-secondary btn-sm-custom flex-fill" title="Search using SteamAPI" data-active="false" data-search-url="https://store.steampowered.com/search/?term=">
                            <i class="bi bi-steam"></i> SteamAPI
                        </button>
                        <button id="steamstoreSearchBtn" class="btn btn-secondary btn-sm-custom flex-fill" title="Search using Steam Store" data-active="false" data-search-url="https://store.steampowered.com/search/?term=">
                            <i class="bi bi-steam"></i> Steam Store
                        </button>
                    </div>
                    <!-- Vertical divider -->
                    <div style="width: 1px; height: 32px; background: #6c757d; margin: 0 12px;"></div>
                    <!-- Right side: 1 button -->
                    <div class="d-flex flex-fill" style="max-width: 50%;">
                        <button id="steamdbSearchBtn" class="btn btn-secondary btn-sm-custom w-100" title="Manually via SteamDB" data-active="false" data-search-url="https://steamdb.info/search/?q=">
                            <i class="bi bi-database"></i> SteamDB
                        </button>
                    </div>
                </div>
            </div>

            <!-- Get App List Section -->
            <div class="p-2 border-bottom border-dark-custom d-flex flex-column" id="getAppSection" style="min-height: 150px; flex: 0 0 auto;">
                <!-- Search Bar -->
                <div class="mb-2">
                  <!-- Search Bar Container - Switches between single and dual mode -->
                  <div id="searchBarContainer">
                    <!-- Single mode (for Steam Store and SteamDB) -->
                    <div id="singleModeSearch" class="input-group input-group-sm">
                      <input 
                        type="text" 
                        id="getAppSearch" 
                        placeholder="Search apps..."
                        class="form-control form-control-sm bg-secondary-custom text-light border-0"
                        style="font-size: 0.75rem; background-color: #808e9b; color: #f8f9fa;"
                        autocomplete="off"
                      >
                      <button id="searchBtn" class="btn btn-secondary" type="button" disabled>
                        <i class="bi bi-search"></i>
                      </button>
                    </div>

                    <!-- Dual mode (for SteamAPI) - 75:25 split -->
                    <div id="dualModeSearch" class="d-none">
                      <div class="d-flex gap-1">
                        <!-- Universal search - 75% -->
                        <div class="input-group input-group-sm" style="flex: 3;">
                          <input 
                            type="text" 
                            id="getAppSearchUniversal" 
                            placeholder="Search apps..."
                            class="form-control form-control-sm bg-secondary-custom text-light border-0"
                            style="font-size: 0.75rem; background-color: #808e9b; color: #f8f9fa;"
                            autocomplete="off"
                            title="Regular Search from SteamAPI"
                          >
                          <button id="searchBtnUniversal" class="btn btn-secondary" type="button" disabled>
                            <i class="bi bi-search"></i>
                          </button>
                        </div>
                        
                        <!-- App ID search - 25% -->
                        <div class="input-group input-group-sm" style="flex: 1;">
                          <input 
                            type="text" 
                            id="getAppSearchAppID" 
                            placeholder="App ID..."
                            class="form-control form-control-sm bg-secondary-custom text-light border-0"
                            style="font-size: 0.75rem; background-color: #808e9b; color: #f8f9fa;"
                            autocomplete="off"
                            pattern="[0-9]*"
                            inputmode="numeric"
                            title="Search by App ID.&#10;Display all DLCs if AppID is a game."
                          >
                          <button id="searchBtnAppID" class="btn btn-secondary" type="button" disabled>
                            <i class="bi bi-hash"></i>
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                  </div>
                  
                 <div id="searchInfo" class="small text-muted-custom mt-1 d-flex align-items-center justify-content-between" style="font-size: 0.7rem; display: none;">
                    <div>
                        Searching with: <span id="activeSearchEngine">None</span>
                    </div>
                    <div id="enterHint" title="Press Enter or Search Icon could display&#10;detailed list of DLCs and its Sorting" class="text-muted-important" style="white-space: nowrap; color: #fffb28; display: none;">
                        <i class="bi bi-info-circle-fill">
                            Press Enter or Icon for Details
                        </i>
                    </div>

                </div>
                <div class="d-flex align-items-center justify-content-between mb-1">
                    <div>
                        <i class="bi bi-info-circle-fill text-info me-2" title="AppList from Selected Servers"></i>
                        <label class="form-label small text-info mb-0">Get App List</label>
                    </div>
                    
                    <!-- Selection notification popup -->
                    <div id="selectionNotification" class="px-3 py-1 bg-dark text-light rounded-pill small text-center" style="z-index: 1000; opacity: 0; transition: opacity 0.3s ease; background-color: rgba(33, 37, 41, 0.6) !important; backdrop-filter: blur(4px); font-size: 0.75rem; white-space: nowrap; pointer-events: none;">
                        <span id="selectionCount">0</span> selected
                    </div>
                    
                    <div class="d-flex align-items-center gap-2">
                        <!-- Type filter: label + dropdown showing only current value (click value to toggle) -->
                        <span class="small text-muted-custom" style="font-size: 0.7rem;">Type:</span>
                        <div class="dropdown" style="position: relative; z-index: 1050;">
                            <button id="typeFilterBtn" class="btn btn-sm btn-secondary bg-secondary-custom text-light border-0 d-flex align-items-center" type="button" aria-expanded="false" style="font-size: 0.7rem; padding: 2px 6px; cursor: pointer; position: relative; z-index: 1051;">
                                <span id="typeFilterValue" style="font-size:0.7rem;">(All)</span>
                                <i class="bi bi-caret-down-fill ms-2" style="font-size: 0.7rem;"></i>
                            </button>
                            <ul id="typeFilterDropdown" class="dropdown-menu dropdown-menu-end p-2 bg-dark-custom text-light" style="min-width: 140px; z-index: 1051;">
                                <li>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="Game" id="filterGame" checked>
                                        <label class="form-check-label small text-light" for="filterGame" style="font-size: 0.8rem;">Game</label>
                                    </div>
                                </li>
                                <li>
                                    <div class="form-check mt-1">
                                        <input class="form-check-input" type="checkbox" value="DLC" id="filterDLC" checked>
                                        <label class="form-check-label small text-light" for="filterDLC" style="font-size: 0.8rem;">DLC</label>
                                    </div>
                                </li>
                                <li><hr class="dropdown-divider bg-secondary-custom"></li>
                                <!-- Apply button removed: filter applies immediately when checkboxes change -->
                            </ul>
                        </div>

                        <span class="small text-muted-custom" style="font-size: 0.7rem;">Sort by:</span>
                        <select id="sortDropdown" class="form-select form-select-sm bg-secondary-custom text-light border-0" style="width: auto; font-size: 0.7rem; padding: 2px 6px;">
                            <option value="relevance">Relevance</option>
                            <option value="id">ID</option>
                            <option value="name">Name</option>
                            <option value="type">Type</option>
                        </select>
                    </div>
                </div>
                <div class="bg-secondary-custom rounded overflow-hidden d-flex flex-column" style="flex: 1; min-height: 0;">
                    <div class="games-container" style="flex: 1; overflow-x: auto; overflow-y: auto;">
                        <div class="games-table">
                            <!-- Header -->
                            <div class="bg-dark-custom text-light small fw-semibold border-bottom border-dark-custom sticky-top">
                                <div class="d-flex" style="width: 100%;">
                                    <div class="col-checkbox text-center border-end border-dark-custom" style="padding: 0.15rem 0.5rem; white-space: nowrap; font-size: 0.75rem;">
                                        <input type="checkbox" id="getAppSelectAll" class="form-check-input form-check-input-sm" style="margin: 0;">
                                    </div>
                                    <div class="col-id text-center border-end border-dark-custom" style="padding: 0.15rem 0.5rem; white-space: nowrap; cursor: pointer; user-select: none; font-size: 0.75rem;" data-app-sort="ID">
                                        ID
                                    </div>
                                    <div class="col-name border-end border-dark-custom" style="padding: 0.15rem 0.5rem; cursor: pointer; user-select: none; font-size: 0.75rem;" data-app-sort="Name">
                                        Name
                                    </div>
                                    <div class="col-type text-center border-end bg-dark-custom" style="padding: 0.15rem 0.5rem; white-space: nowrap; cursor: pointer; user-select: none; font-size: 0.75rem;" data-app-sort="Type">
                                        Type
                                    </div>
                                </div>
                            </div>
                            <!-- List Content -->
                            <div id="getAppList" class="w-100">
                              <!-- Search results will appear here -->
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Minimalist down arrow button with side lines -->
                <div id="downBtn" class="d-flex align-items-center justify-content-center mt-1" style="width: 100%; cursor: pointer; padding: 4px 0;" title="Move selected games down to main list">
                    <div class="arrow-side-line"></div>
                    <div class="p-1 mx-2" style="font-size: 0.8rem; line-height: 1; color: #6c757d;">
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <div class="arrow-side-line"></div>
                </div>
            </div>

            <!-- Resizable Divider -->
            <div class="horizontal-resizer" id="horizontalResizer">
                <div class="resizer-line"></div>
            </div>

            <!-- Profile Section -->
            <!-- <div class="p-2 border-bottom border-dark-custom">
                <label class="form-label small text-muted-custom mb-1">Profile</label>
                <select id="profileSelect" class="form-select form-select-sm bg-secondary-custom text-light border-0 mb-2">
                    <option value="default">default</option>
                </select>
                <div class="d-flex gap-1">
                    <button id="newProfileBtn" class="btn btn-secondary btn-sm-custom flex-fill">
                        New Profile
                    </button>
                    <button id="deleteProfileBtn" class="btn btn-secondary btn-sm-custom flex-fill">
                        Delete Profile
                    </button>
                </div>
            </div> -->

           
            <!-- Games List Section -->
            <div class="p-2 d-flex flex-column" id="gamesSection" style="min-height: 150px; flex: 1 1 auto;">
                <div class="d-flex align-items-center justify-content-between mb-1">
                    <div>
                        <i class="bi bi-info-circle-fill text-info me-2" title="Imported AppList from above"></i>
                    <label class="form-label small text-info mb-0">Games List</label>
                    </div>
                    <!-- Selection notification popup -->
                    <div id="gamesSelectionNotification" class="px-3 py-1 bg-dark text-light rounded-pill small text-center" style="z-index: 1000; opacity: 0; transition: opacity 0.3s ease; background-color: rgba(33, 37, 41, 0.6) !important; backdrop-filter: blur(4px); font-size: 0.75rem; white-space: nowrap; pointer-events: none;">
                        <span id="gamesSelectionCount">0</span> selected
                    </div>
                    
                    <div class="d-flex align-items-center gap-1">
                        <span class="small text-muted-custom" style="font-size: 0.7rem;">Start from:</span>
                        <input 
                            type="number" 
                            id="priorityStart" 
                            value="0" 
                            min="0" 
                            max="999"
                            class="form-control form-control-sm bg-secondary-custom text-light border-0" 
                            style="width: 50px; height: 22px; font-size: 0.7rem; text-align: center; color: #f8f9fa !important;"
                        >
                        <button id="applyPriorityStartBtn" class="btn btn-outline-secondary btn-sm p-1" title="Apply Priority Start" style="font-size: 0.7rem; padding: 2px 6px;">
                            OK
                        </button>
                    </div>
                </div>
                <div class="bg-secondary-custom rounded overflow-hidden d-flex flex-column" style="flex: 1; min-height: 150px;">
                    <div class="games-container" style="flex: 1; overflow-x: auto; overflow-y: auto;">
                        <div class="games-table">
                            <!-- Header -->
                            <div class="bg-dark-custom text-light small fw-semibold border-bottom border-dark-custom sticky-top">
                                <div class="d-flex" style="width: 100%;">
                                    <div class="col-checkbox text-center border-end border-dark-custom" style="padding: 0.15rem 0.5rem; white-space: nowrap; font-size: 0.75rem;">
                                        <input type="checkbox" id="selectAll" class="form-check-input form-check-input-sm" style="margin: 0;">
                                    </div>
                                    <div class="col-priority text-center border-end border-dark-custom" style="padding: 0.15rem 0.25rem; white-space: nowrap; cursor: pointer; user-select: none; font-size: 0.75rem;" data-sort="Priority">
                                        #
                                    </div>
                                    <div class="col-id text-center border-end border-dark-custom" style="padding: 0.15rem 0.5rem; white-space: nowrap; cursor: pointer; user-select: none; font-size: 0.75rem;" data-sort="ID">
                                        ID
                                    </div>
                                    <div class="col-name border-end border-dark-custom" style="padding: 0.15rem 0.5rem; cursor: pointer; user-select: none; font-size: 0.75rem;" data-sort="Name">
                                        Name
                                    </div>
                                    <div class="col-type text-center border-end bg-dark-custom" style="padding: 0.15rem 0.5rem; white-space: nowrap; cursor: pointer; user-select: none; font-size: 0.75rem;" data-sort="Type">
                                        Type
                                    </div>
                                </div>
                            </div>
                            <!-- List Content -->
                            <div id="gamesList" class="w-100">
                              <!-- Games will be populated via Down Button from Get App List -->
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Minimalist clear button with side lines -->
                <div id="clearBtnContainer" class="d-flex align-items-center justify-content-center mt-1 text-muted" style="width: 100%; cursor: pointer;" role="button" tabindex="0" title="Clear selected games">
                    <div class="arrow-side-line"></div>
                    <span class="d-flex align-items-center justify-content-center mx-2" style="font-size: 0.7rem; line-height: 1; pointer-events: none;">
                        <i class="bi bi-x-lg"></i>
                    </span>
                    <div class="arrow-side-line"></div>
                </div>
            </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <footer class="bg-dark-custom p-2 border-top border-dark-custom">
            <!-- Import/Export Section -->
            <div class="d-flex align-items-center gap-2 mb-2">
              <i class="bi bi-info-circle-fill text-info me-2" title="Rename and Export/Import to local storage as '.json'"></i>
              <input 
                type="text" 
                id="folderPath" 
                placeholder="Save your AppList eg. Furry Futa Collection"
                class="form-control form-control-sm bg-secondary-custom text-light border-0 flex-fill"
                style="font-size: 0.7rem;"
              >
              <button id="importBtn" class="btn btn-outline-primary btn-sm p-1" title="Import List">
                <i class="bi bi-upload"></i>
              </button>
              <button id="exportBtn" class="btn btn-outline-info btn-sm p-1" title="Export List">
                <i class="bi bi-download"></i>
              </button>
            </div>
                       
            <!-- Action Buttons -->
            <div class="d-flex align-items-center justify-content-between">

                <div class="action-buttons-container">

                    <!-- <button id="settingsBtn" class="btn btn-sm btn-light ms-2" title="Settings" style="border-radius: 50%; width: 22px; height: 22px; padding: 0;">
                        <i class="bi bi-gear"></i>
                    </button> -->

                    <button id="generateBtn" class="action-btn action-btn-primary me-1 ms-2" title="Generate">
                        <i class="bi bi-play-fill"></i>
                        <span>Generate</span>
                    </button>
                    
                    <div class="action-btn-group">
                        <button id="copyBtn" class="action-btn action-btn-light" title="Copy to clipboard">
                            <i class="bi bi-clipboard"></i>
                        </button>
                        
                        <div class="btn-group">
                            <button id="downloadBtn" class="action-btn action-btn-light dropdown-toggle" type="button" aria-expanded="false" title="Download options">
                                <i class="bi bi-download"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end bg-dark-custom">
                                <li><a class="dropdown-item text-light" href="#" id="downloadAppListBtn">
                                    <i class="bi bi-file-earmark-text me-2"></i>Download AppList.txt
                                </a></li>
                                <li><a class="dropdown-item text-light" href="#" id="downloadZipBtn">
                                    <i class="bi bi-file-earmark-zip me-2"></i>Download as .zip
                                </a></li>
                                <li><a class="dropdown-item text-light" href="#" id="downloadBatBtn">
                                    <i class="bi bi-file-earmark-code me-2"></i>Download as .bat
                                </a></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="small text-muted">v1.3.0</div>
         </div>
        </footer>
    </div>

    <!-- Resize handle (corner) -->
    <div id="resize-handle" class="resize-handle-corner" title="Resize">
        <i class="bi bi-arrow-up-left" aria-hidden="true"></i>
        <span class="visually-hidden">Resize</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script src="app-sort.js"></script>
    <script src="utils.js"></script>
    <script src="search.js"></script>
    <script src="generator.js"></script>
</body>
</html>
